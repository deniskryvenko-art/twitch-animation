<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{
margin:0;
background:transparent;
overflow:hidden;
}

.banner{
position:absolute;
top:20px;
left:-500px;
padding:12px 28px;
border-radius:16px;

background:rgba(120,0,255,.15);
backdrop-filter:blur(8px);

font-family:Arial,sans-serif;
font-weight:900;
font-size:28px;
color:white;

box-shadow:
0 0 15px #9147ff,
0 0 35px #9147ff;

animation:slide 5s infinite;
}

.twitch{
color:#b57cff;
text-shadow:
0 0 10px #9147ff,
0 0 20px #9147ff,
0 0 40px #9147ff;
}

.nick{
margin-left:10px;
}

@keyframes slide{

0%{
left:-500px;
opacity:0;
transform:scale(.8);
}

20%{
left:20px;
opacity:1;
transform:scale(1);
}

80%{
left:20px;
opacity:1;
}

100%{
left:500px;
opacity:0;
}
}
</style>
</head>

<body>

<div class="banner">
<span class="twitch">TWITCH</span>
<span class="nick">eLpannCh0</span>
</div>

</body>
</html>
