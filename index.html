<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

.overlay {
  position: absolute;
  top: 25px;
  left: 25px;
  width: 620px;
  height: 125px;
  display: flex;
  align-items: center;
  animation: showHide 7s infinite ease-in-out;
  filter: drop-shadow(0 0 22px rgba(145, 71, 255, 0.9));
}

.logoBox {
  width: 115px;
  height: 115px;
  border-radius: 28px;
  background: rgba(20, 0, 45, 0.72);
  border: 3px solid #a855ff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  box-shadow:
    0 0 18px #8b35ff,
    inset 0 0 22px rgba(180, 100, 255, .4);
  animation: pulse 2.2s infinite ease-in-out;
}

.logo {
  width: 68px;
  height: 68px;
  fill: white;
  filter: drop-shadow(0 0 10px #b66cff);
}

.panel {
  position: relative;
  margin-left: -20px;
  width: 520px;
  height: 88px;
  border-radius: 22px;
  overflow: hidden;
  background:
    linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.04)),
    rgba(16, 8, 35, .70);
  backdrop-filter: blur(14px);
  border: 2px solid rgba(180, 100, 255, .85);
  box-shadow:
    inset 0 0 25px rgba(255,255,255,.08),
    0 0 24px rgba(145,71,255,.85);
}

.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,.16) 35%,
    rgba(190,120,255,.45) 50%,
    rgba(255,255,255,.16) 65%,
    transparent 100%
  );
  transform: translateX(-120%);
  animation: glassSweep 3.5s infinite;
}

.energy {
  position: absolute;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #fff, #9b4dff, transparent);
  box-shadow: 0 0 14px #b76cff;
  animation: energyLine 2.6s infinite linear;
}

.energy.top {
  top: 8px;
}

.energy.bottom {
  bottom: 8px;
  animation-delay: .8s;
}

.text {
  position: relative;
  z-index: 2;
  height: 100%;
  padding-left: 55px;
  padding-right: 30px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.platform {
  font-size: 34px;
  font-weight: 900;
  color: #9d4dff;
  letter-spacing: 1px;
  text-shadow:
    0 0 10px #9d4dff,
    0 0 22px rgba(157,77,255,.9);
}

.divider {
  width: 2px;
  height: 42px;
  background: linear-gradient(180deg, transparent, #c084ff, transparent);
  box-shadow: 0 0 10px #c084ff;
}

.nick {
  font-size: 34px;
  font-weight: 900;
  color: white;
  text-shadow:
    0 0 8px rgba(255,255,255,.8),
    0 0 18px rgba(160,90,255,.8);
}

.spark {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  box-shadow:
    0 0 10px white,
    0 0 22px #a855ff;
  animation: sparkMove 2.8s infinite linear;
}

.s1 { top: 18px; left: 150px; }
.s2 { bottom: 20px; left: 350px; animation-delay: 1.2s; }
.s3 { top: 58px; left: 520px; animation-delay: 2s; }

@keyframes showHide {
  0% {
    transform: translateX(-720px) scale(.92);
    opacity: 0;
  }
  12% {
    transform: translateX(0) scale(1);
    opacity: 1;
  }
  78% {
    transform: translateX(0) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateX(720px) scale(.96);
    opacity: 0;
  }
}

@keyframes pulse {
  0%, 100% {
    box-shadow:
      0 0 18px #8b35ff,
      inset 0 0 22px rgba(180,100,255,.4);
  }
  50% {
    box-shadow:
      0 0 35px #b66cff,
      inset 0 0 35px rgba(220,180,255,.6);
  }
}

@keyframes glassSweep {
  0% { transform: translateX(-130%); }
  55% { transform: translateX(130%); }
  100% { transform: translateX(130%); }
}

@keyframes energyLine {
  0% { transform: translateX(-100%); opacity: 0; }
  15% { opacity: 1; }
  85% { opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}

@keyframes sparkMove {
  0% {
    transform: translateX(-40px) scale(.5);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  100% {
    transform: translateX(180px) scale(1.3);
    opacity: 0;
  }
}
</style>
</head>

<body>
  <div class="overlay">
    <div class="logoBox">
      <svg class="logo" viewBox="0 0 2400 2800">
        <path d="M500 0h1700v1200l-500 500h-400l-300 300H700v-300H300V400L500 0zm100 300v1100h400v300l300-300h400l300-300V300H600zm500 300h200v500h-200V600zm500 0h200v500h-200V600z"/>
      </svg>
    </div>

    <div class="panel">
      <div class="energy top"></div>
      <div class="energy bottom"></div>

      <div class="spark s1"></div>
      <div class="spark s2"></div>
      <div class="spark s3"></div>

      <div class="text">
        <div class="platform">TWITCH</div>
        <div class="divider"></div>
        <div class="nick">eLpannCh0</div>
      </div>
    </div>
  </div>
</body>
</html>
